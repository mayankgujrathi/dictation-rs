name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Release Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      WIN_CERT_PFX_BASE64: ${{ secrets.WIN_CERT_PFX_BASE64 }}
      WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
      LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2

      - name: Initialize MSVC developer command prompt (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux GUI/audio build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libclang-dev \
            libgtk-3-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libwayland-dev \
            libx11-dev \
            libxi-dev \
            libxtst-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxdo-dev \
            libudev-dev \
            libayatana-appindicator3-1 \
            libayatana-appindicator3-dev

      - name: Verify Linux GUI/audio dependencies are present
        if: runner.os == 'Linux'
        run: |
          pkg-config --exists alsa
          pkg-config --exists x11
          pkg-config --exists xi
          pkg-config --exists xtst
          pkg-config --exists xrandr
          pkg-config --exists xinerama
          pkg-config --exists xcursor
          pkg-config --exists xkbcommon
          pkg-config --exists xkbcommon-x11
          pkg-config --exists gdk-3.0
          pkg-config --exists gtk+-3.0
          pkg-config --exists atk
          pkg-config --exists wayland-client
          pkg-config --exists libudev
          ldconfig -p | grep -q libxdo
          ldconfig -p | grep -Eq 'libayatana-appindicator3\.so|libappindicator3\.so'

      - name: Detect accelerator and choose build feature (Linux)
        if: runner.os == 'Linux'
        id: accel
        shell: bash
        run: |
          FEATURE="ort-cpu"
          if command -v nvcc >/dev/null 2>&1; then
            FEATURE="ort-cuda"
          elif command -v nvidia-smi >/dev/null 2>&1; then
            FEATURE="ort-cuda"
          elif [[ -n "${CUDA_PATH:-}" || -n "${CUDA_HOME:-}" ]]; then
            FEATURE="ort-cuda"
          fi
          echo "feature=$FEATURE" >> "$GITHUB_OUTPUT"

      - name: Configure Windows CUDA environment and feature
        if: runner.os == 'Windows'
        id: accel_win
        shell: pwsh
        run: |
          $feature = "ort-cpu"
          $cudaRoot = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA" -Directory -ErrorAction SilentlyContinue |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if ($cudaRoot) {
            $feature = "ort-cuda"
            "CUDA_PATH=$($cudaRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            "$($cudaRoot.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
            "$($cudaRoot.FullName)\lib\x64" | Out-File -FilePath $env:GITHUB_PATH -Append
            if ($env:LIB) {
              "LIB=$env:LIB;$($cudaRoot.FullName)\lib\x64" | Out-File -FilePath $env:GITHUB_ENV -Append
            } else {
              "LIB=$($cudaRoot.FullName)\lib\x64" | Out-File -FilePath $env:GITHUB_ENV -Append
            }
            "CUDA_PATH_V12_0=$($cudaRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

          "feature=$feature" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Selected feature: $feature"

      - name: Windows linker/toolchain diagnostics
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          where.exe link
          rustc -vV
          cargo -V
          if ($env:CUDA_PATH) { Write-Host "CUDA_PATH=$env:CUDA_PATH" }

      - name: Resolve final cargo features
        id: cargo_features
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            FEATURES="ort-coreml"
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            FEATURES="${{ steps.accel_win.outputs.feature }}"
          else
            FEATURES="${{ steps.accel.outputs.feature }},x11,wayland"
          fi
          echo "value=$FEATURES" >> "$GITHUB_OUTPUT"
          echo "Using cargo features: $FEATURES"

      - name: Select macOS feature (CoreML/Metal path)
        if: runner.os == 'macOS'
        id: accel_macos
        shell: bash
        run: echo "feature=ort-coreml" >> "$GITHUB_OUTPUT"

      - name: Build release (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          FEATURE="${{ steps.cargo_features.outputs.value }}"
          cargo build --release --locked --no-default-features --features "$FEATURE"

      - name: Build release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $feature = "${{ steps.cargo_features.outputs.value }}"
          cargo build --release --locked --no-default-features --features $feature

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          APPDIR="dictation.AppDir"
          VERSION="${{ github.ref_name }}"

          rm -rf "${APPDIR}"
          mkdir -p "${APPDIR}/usr/bin" "${APPDIR}/usr/share/applications" "${APPDIR}/usr/share/icons/hicolor/256x256/apps"
          cp target/release/dictation "${APPDIR}/usr/bin/dictation"
          cp assets/activity.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/dictation.png"
          cp assets/activity.png "${APPDIR}/dictation.png"

          cat > "${APPDIR}/AppRun" <<'APPRUN'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/dictation" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          cat > "${APPDIR}/dictation.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Dictation
          Exec=dictation
          Icon=dictation
          Categories=Utility;
          Terminal=false
          DESKTOP
          cp "${APPDIR}/dictation.desktop" "${APPDIR}/usr/share/applications/dictation.desktop"

          APPIMAGE_TOOL="appimagetool-x86_64.AppImage"
          curl -L -o "${APPIMAGE_TOOL}" "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x "${APPIMAGE_TOOL}"
          ARCH=x86_64 ./${APPIMAGE_TOOL} --appimage-extract-and-run "${APPDIR}" "dist/dictation-${VERSION}-linux.AppImage"
          sha256sum "dist/dictation-${VERSION}-linux.AppImage" > "dist/dictation-${VERSION}-linux.AppImage.sha256"

      - name: Package macOS drag-and-drop DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist dmg

          APP_NAME="Dictation"
          APP_BUNDLE="${APP_NAME}.app"
          CONTENTS_DIR="${APP_BUNDLE}/Contents"
          VERSION="${{ github.ref_name }}"

          mkdir -p "${CONTENTS_DIR}/MacOS" "${CONTENTS_DIR}/Resources"
          cp target/release/dictation "${CONTENTS_DIR}/MacOS/dictation"
          cp assets/activity.png "${CONTENTS_DIR}/Resources/activity.png"
          chmod +x "${CONTENTS_DIR}/MacOS/dictation"

          cat > "${CONTENTS_DIR}/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleName</key><string>Dictation</string>
              <key>CFBundleDisplayName</key><string>Dictation</string>
              <key>CFBundleIdentifier</key><string>com.dictation.dictation</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleExecutable</key><string>dictation</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>LSMinimumSystemVersion</key><string>11.0</string>
              <key>CFBundleIconFile</key><string>activity.png</string>
            </dict>
          </plist>
          PLIST

          cp -R "${APP_BUNDLE}" dmg/
          hdiutil create -volname "Dictation" -srcfolder dmg -ov -format UDZO "dist/dictation-${VERSION}-macos.dmg"

      - name: Package Windows installer (NSIS)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/dictation.exe" "dist/dictation.exe"

          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
            $env:PATH = "C:\Program Files (x86)\NSIS;C:\Program Files\NSIS;$env:PATH"
          }

          @'
          !define APP_NAME "Dictation"
          !define APP_EXE "dictation.exe"
          !define VERSION "${{ github.ref_name }}"
          OutFile "dictation-${VERSION}-windows-installer.exe"
          InstallDir "$LOCALAPPDATA\Programs\Dictation"
          RequestExecutionLevel user
          Page directory
          Page instfiles
          Section "Install"
            SetOutPath "$INSTDIR"
            File "dist\${APP_EXE}"
            CreateDirectory "$SMPROGRAMS\${APP_NAME}"
            CreateShortcut "$SMPROGRAMS\${APP_NAME}\${APP_NAME}.lnk" "$INSTDIR\${APP_EXE}"
            CreateShortcut "$DESKTOP\Dictation.lnk" "$INSTDIR\${APP_EXE}"
            WriteUninstaller "$INSTDIR\Uninstall.exe"
          SectionEnd
          Section "Uninstall"
            Delete "$SMPROGRAMS\${APP_NAME}\${APP_NAME}.lnk"
            RMDir "$SMPROGRAMS\${APP_NAME}"
            Delete "$DESKTOP\Dictation.lnk"
            Delete "$INSTDIR\${APP_EXE}"
            Delete "$INSTDIR\Uninstall.exe"
            RMDir "$INSTDIR"
          SectionEnd
          '@ | Set-Content -Path installer.nsi

          & makensis installer.nsi
          Move-Item "dictation-${{ github.ref_name }}-windows-installer.exe" "dist/dictation-${{ github.ref_name }}-windows-installer.exe" -Force

      - name: Optional Windows installer signing (Phase 2)
        if: runner.os == 'Windows' && env.WIN_CERT_PFX_BASE64 != '' && env.WIN_CERT_PASSWORD != ''
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("codesign.pfx", [Convert]::FromBase64String("${{ secrets.WIN_CERT_PFX_BASE64 }}"))
          $installer = "dist/dictation-${{ github.ref_name }}-windows-installer.exe"
          signtool sign /f codesign.pfx /p "${{ secrets.WIN_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $installer
          signtool verify /pa $installer

      - name: Optional macOS codesign + notarize (Phase 2)
        if: runner.os == 'macOS' && env.MACOS_CERT_P12_BASE64 != '' && env.MACOS_CERT_PASSWORD != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != '' && env.KEYCHAIN_PASSWORD != ''
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          APP_PATH="dmg/Dictation.app"
          DMG_PATH="dist/dictation-${VERSION}-macos.dmg"

          echo "${{ secrets.MACOS_CERT_P12_BASE64 }}" | base64 --decode > signing_cert.p12
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import signing_cert.p12 -k build.keychain -P "${{ secrets.MACOS_CERT_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain

          IDENTITY="$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -n1 | sed -E 's/.*\"(.*)\"/\1/')"
          codesign --deep --force --options runtime --sign "$IDENTITY" "$APP_PATH"

          xcrun notarytool submit "$DMG_PATH" --apple-id "${{ secrets.APPLE_ID }}" --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" --team-id "${{ secrets.APPLE_TEAM_ID }}" --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Optional Linux checksum + GPG signature (Phase 2)
        if: runner.os == 'Linux' && env.LINUX_GPG_PRIVATE_KEY != '' && env.LINUX_GPG_PASSPHRASE != ''
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          APPIMAGE="dist/dictation-${VERSION}-linux.AppImage"
          sha256sum "$APPIMAGE" > "${APPIMAGE}.sha256"

          echo "${{ secrets.LINUX_GPG_PRIVATE_KEY }}" | base64 --decode | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.LINUX_GPG_PASSPHRASE }}" \
            --armor --detach-sign "${APPIMAGE}.sha256"

      - name: Upload Linux release assets
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dictation-${{ github.ref_name }}-linux.AppImage
            dist/dictation-${{ github.ref_name }}-linux.AppImage.sha256
          generate_release_notes: true

      - name: Upload Linux GPG signature (Phase 2)
        if: runner.os == 'Linux' && env.LINUX_GPG_PRIVATE_KEY != '' && env.LINUX_GPG_PASSPHRASE != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dictation-${{ github.ref_name }}-linux.AppImage.sha256.asc
          generate_release_notes: true

      - name: Upload Windows release asset
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dictation-${{ github.ref_name }}-windows-installer.exe
          generate_release_notes: true

      - name: Upload macOS release asset
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dictation-${{ github.ref_name }}-macos.dmg
          generate_release_notes: true
