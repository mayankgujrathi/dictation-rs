name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Release Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            bin_name: dictation
            archive_ext: tar.gz
          - os: macos-latest
            target: macos
            bin_name: dictation
            archive_ext: tar.gz
          - os: windows-latest
            target: windows
            bin_name: dictation.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2

      - name: Initialize MSVC developer command prompt (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux GUI/audio build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libclang-dev \
            libgtk-3-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libwayland-dev \
            libx11-dev \
            libxi-dev \
            libxtst-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libudev-dev

      - name: Verify Linux GUI/audio dependencies are present
        if: runner.os == 'Linux'
        run: |
          pkg-config --exists alsa
          pkg-config --exists x11
          pkg-config --exists xi
          pkg-config --exists xtst
          pkg-config --exists xrandr
          pkg-config --exists xinerama
          pkg-config --exists xcursor
          pkg-config --exists xkbcommon
          pkg-config --exists xkbcommon-x11
          pkg-config --exists gdk-3.0
          pkg-config --exists gtk+-3.0
          pkg-config --exists atk
          pkg-config --exists wayland-client
          pkg-config --exists libudev

      - name: Detect accelerator and choose build feature (Linux)
        if: runner.os == 'Linux'
        id: accel
        shell: bash
        run: |
          FEATURE="ort-cpu"
          if command -v nvcc >/dev/null 2>&1; then
            FEATURE="ort-cuda"
          elif command -v nvidia-smi >/dev/null 2>&1; then
            FEATURE="ort-cuda"
          elif [[ -n "${CUDA_PATH:-}" || -n "${CUDA_HOME:-}" ]]; then
            FEATURE="ort-cuda"
          fi
          echo "feature=$FEATURE" >> "$GITHUB_OUTPUT"

      - name: Configure Windows CUDA environment and feature
        if: runner.os == 'Windows'
        id: accel_win
        shell: pwsh
        run: |
          $feature = "ort-cpu"
          $cudaRoot = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA" -Directory -ErrorAction SilentlyContinue |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if ($cudaRoot) {
            $feature = "ort-cuda"
            "CUDA_PATH=$($cudaRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            "$($cudaRoot.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
            "$($cudaRoot.FullName)\lib\x64" | Out-File -FilePath $env:GITHUB_PATH -Append
            if ($env:LIB) {
              "LIB=$env:LIB;$($cudaRoot.FullName)\lib\x64" | Out-File -FilePath $env:GITHUB_ENV -Append
            } else {
              "LIB=$($cudaRoot.FullName)\lib\x64" | Out-File -FilePath $env:GITHUB_ENV -Append
            }
            "CUDA_PATH_V12_0=$($cudaRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

          "feature=$feature" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Selected feature: $feature"

      - name: Windows linker/toolchain diagnostics
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          where.exe link
          rustc -vV
          cargo -V
          if ($env:CUDA_PATH) { Write-Host "CUDA_PATH=$env:CUDA_PATH" }

      - name: Resolve final cargo features
        id: cargo_features
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            FEATURES="ort-coreml"
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            FEATURES="${{ steps.accel_win.outputs.feature }}"
          else
            FEATURES="${{ steps.accel.outputs.feature }},x11,wayland"
          fi
          echo "value=$FEATURES" >> "$GITHUB_OUTPUT"
          echo "Using cargo features: $FEATURES"

      - name: Select macOS feature (CoreML/Metal path)
        if: runner.os == 'macOS'
        id: accel_macos
        shell: bash
        run: echo "feature=ort-coreml" >> "$GITHUB_OUTPUT"

      - name: Build release (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          FEATURE="${{ steps.cargo_features.outputs.value }}"
          cargo build --release --locked --no-default-features --features "$FEATURE"

      - name: Build release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $feature = "${{ steps.cargo_features.outputs.value }}"
          cargo build --release --locked --no-default-features --features $feature

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          tar -C dist -czf "dictation-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" "${{ matrix.bin_name }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          Compress-Archive -Path "dist/${{ matrix.bin_name }}" -DestinationPath "dictation-${{ github.ref_name }}-${{ matrix.target }}.zip" -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dictation-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          generate_release_notes: true
